<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Kitty Themed Bio Link</title>
    <style>
        body {
            background-color: #ffe6f2;
            font-family: 'Arial', sans-serif;
            color: #333;
            text-align: center;
        }
        header {
            background-color: #ffccff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        footer {
            margin-top: 20px;
            font-size: 0.8em;
            color: #aaa;
        }
        .button {
            background-color: #ff6699;
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 12px;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #ff3366;
        }
    </style>
</head>
<body>
    <header>
        <h1>Hello Kitty Love</h1>
        <img src='https://example.com/hello-kitty.png' alt='Hello Kitty' />
    </header>
    <main>
        <h2>Welcome to My Bio Link!</h2>
        <p>Click below to find out more about me!</p>
        <a href="https://example.com" class="button">My Profile</a>
        <a href="https://example.com/portfolio" class="button">Portfolio</a>
    </main>
    <footer>
        <p>© 2026 Hello Kitty Fan. All rights reserved.</p>
    </footer>
</body>
</html>
